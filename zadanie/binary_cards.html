<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Karty binarne</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(270deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0,#fbc2eb);
background-size:1000% 1000%;
animation:gradientMove 15s ease infinite;
margin:0;
min-height:100vh;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:rgb(0, 0, 0);
text-shadow:2px 2px 6px black;
}

#cards{
display:grid;
grid-template-columns:repeat(4,120px);
gap:15px;
justify-content:center;
margin-top:30px;
}

/* karta */

.card{
width:120px;
height:160px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.6s;
transform-style:preserve-3d;
}

.card.active .card-inner{
transform:rotateY(180deg);
}

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.card-front{
background:#333;
}

.card-back{
background:white;
transform:rotateY(180deg);
overflow:hidden;
}

.card-back img{
width:100%;
height:100%;
object-fit:cover;
}

#result{
font-size:32px;
margin-top:30px;
color:rgb(0, 0, 0);
text-shadow:1px 1px 4px black;
}

#binary{
font-size:26px;
margin-top:10px;
color:rgb(0, 0, 0);
text-shadow:1px 1px 4px black;
}

</style>
</head>

<body>

<h1>Karty binarne</h1>

<div id="cards"></div>

<div id="result">Wynik: 0</div>
<div id="binary">Binarnie: 0</div>

<script>

const values=[1,2,4,8,16,32,64,128,256,512,1024,2048];
let sum=0;

const cards=document.getElementById("cards");
const result=document.getElementById("result");
const binary=document.getElementById("binary");

values.forEach(v=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="card-inner">
<div class="card-front"></div>
<div class="card-back">
<img src="images/${v}.png">
</div>
</div>
`;

card.onclick=()=>{

card.classList.toggle("active");

if(card.classList.contains("active")){
sum+=v;
}else{
sum-=v;
}

result.textContent="Wynik: "+sum;
binary.textContent="Binarnie: "+sum.toString(2);

};

cards.appendChild(card);

});

</script>

</body>
</html>
